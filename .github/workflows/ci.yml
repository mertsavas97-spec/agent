name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            apps/mobile/package-lock.json
            functions/package-lock.json
            scripts/solve-proxy/package-lock.json

      - name: Install mobile deps
        run: npm ci --prefix apps/mobile

      - name: Install functions deps
        run: npm ci --prefix functions

      - name: Install solve-proxy deps
        run: npm ci --prefix scripts/solve-proxy

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint --prefix apps/mobile

      - name: Mobile tests
        run: npm test --prefix apps/mobile -- --ci --maxWorkers=2 --passWithNoTests

      - name: Functions tests
        run: npm test --prefix functions -- --ci --maxWorkers=2

      - name: Solve-proxy tests
        run: npm test --prefix scripts/solve-proxy -- --ci --maxWorkers=2
