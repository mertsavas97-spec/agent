# Android production AAB via EAS local on GitHub Actions
# (avoids Expo cloud build quota + owner Mac disk pressure)
#
# Owner: Actions → "Android production AAB" → Run workflow
# Secrets required (repo Settings → Secrets and variables → Actions):
#   EXPO_TOKEN
#   EXPO_PUBLIC_FIREBASE_API_KEY
#   EXPO_PUBLIC_FIREBASE_APP_ID
# Optional (if app needs them at runtime):
#   EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN
#   EXPO_PUBLIC_FIREBASE_PROJECT_ID
#   EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET
#   EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID

name: Android production AAB

on:
  workflow_dispatch:

concurrency:
  group: android-prod-aab-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-aab:
    name: eas build --local (production)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: apps/mobile

    env:
      EAS_BUILD_PROFILE: production
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EAS_LOCAL_BUILD_WORKINGDIR: ${{ github.workspace }}/.eas-local-build
      # Avoid interactive prompts
      CI: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets
        working-directory: .
        run: |
          missing=0
          for key in EXPO_TOKEN EXPO_PUBLIC_FIREBASE_API_KEY EXPO_PUBLIC_FIREBASE_APP_ID; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing secret: $key"
              missing=1
            fi
          done
          exit $missing

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Free runner disk (pre-SDK)
        working-directory: .
        run: |
          sudo rm -rf /usr/share/dotnet || true
          df -h

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile deps
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: EAS local production AAB
        run: |
          mkdir -p "$EAS_LOCAL_BUILD_WORKINGDIR"
          eas build \
            --platform android \
            --profile production \
            --local \
            --non-interactive \
            --output "$GITHUB_WORKSPACE/cozbil-production.aab"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: cozbil-android-production-aab
          path: cozbil-production.aab
          if-no-files-found: error
          retention-days: 14

      - name: Disk after build
        if: always()
        working-directory: .
        run: df -h
